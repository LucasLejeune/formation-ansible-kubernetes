# =============================================================================
# Exemple de Secret Kubernetes (J5) — approche manuelle.
# NB : un Secret n'est PAS chiffré, juste encodé base64. Ne pas committer
# de vraies valeurs ; préférer Ansible Vault + stringData (voir k8s-deploy.yml).
# Générer la valeur : echo -n 'mon-token' | base64
# =============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: taskflow-secret
  namespace: taskflow
type: Opaque
stringData:
  API_TOKEN: "dev-token-please-change"
