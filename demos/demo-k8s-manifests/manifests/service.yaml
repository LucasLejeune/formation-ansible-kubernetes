apiVersion: v1
kind: Service
metadata:
  name: webserver
  namespace: demo
  labels:
    app: webserver
    app.kubernetes.io/managed-by: "formation-ansible-kubernetes"
spec:
  # ClusterIP : accessible uniquement à l'intérieur du cluster
  # On utilisera kubectl port-forward pour y accéder depuis l'extérieur
  type: ClusterIP
  selector:
    app: webserver
  ports:
    - name: http
      port: 80
      targetPort: 80
      protocol: TCP
