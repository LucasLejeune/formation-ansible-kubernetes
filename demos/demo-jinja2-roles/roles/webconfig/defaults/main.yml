---
# Valeurs par défaut du rôle webconfig
# Ces variables peuvent être surchargées à l'exécution avec -e "variable=valeur"

# Nom de l'application
app_name: "taskflow"

# Port d'écoute du service
app_port: 8080

# Environnement de déploiement
app_env: "development"

# Répertoire de destination du fichier de config
app_config_dir: "/tmp"

# Niveau de log
app_log_level: "info"

# Activer le mode debug (affiche des infos supplémentaires dans la config)
app_debug: false

# Liste des fonctionnalités activées
app_features:
  - name: "authentication"
    enabled: true
  - name: "notifications"
    enabled: false
  - name: "analytics"
    enabled: true

# Limites de ressources
app_max_connections: 100
app_timeout_seconds: 30
